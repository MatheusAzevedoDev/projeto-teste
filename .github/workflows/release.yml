name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Sincronizar versão com última tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
              echo "package.json ($CURRENT_VERSION) desatualizado, sincronizando com $LATEST_TAG..."
              npm version "$LATEST_VERSION" --no-git-tag-version --allow-same-version
            else
              echo "Versão já sincronizada: $CURRENT_VERSION"
            fi
          fi

      - name: Detectar se é só mudança de docs
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD)
          if echo "$CHANGED" | grep -qvE '^docs/'; then
            echo "docs_only=false" >> $GITHUB_OUTPUT
          else
            echo "docs_only=true" >> $GITHUB_OUTPUT
          fi

      - name: Detectar tipo de bump
        id: bump
        if: steps.check.outputs.docs_only == 'false'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|perf)(\([^)]+\))?!:" || echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "type=$BUMP" >> $GITHUB_OUTPUT
          echo "Bump detectado: $BUMP"

      - name: Bumpar versão
        if: steps.check.outputs.docs_only == 'false'
        env:
          HUSKY: 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          while git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "v$VERSION"; do
            echo "Tag v$VERSION já existe, incrementando patch..."
            npm version patch --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          done
          echo "Versão final: $VERSION"

      - name: Atualizar changelog
        if: steps.check.outputs.docs_only == 'false'
        run: npm run changelog:all

      - name: Commitar e criar tag
        if: steps.check.outputs.docs_only == 'false'
        env:
          HUSKY: 0
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json CHANGELOG.md
          git commit -m "v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push
          git push --tags

      - name: Criar release no GitHub
        if: steps.check.outputs.docs_only == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file CHANGELOG.md

      - name: Notificar portfolio-hub
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PROJECT=$(node -p "require('./package.json').name")
          DISPLAY_NAME=$(node -p "require('./package.json').displayName || require('./package.json').name")
          DESCRIPTION=$(node -p "require('./package.json').description || ''")
          TAGS=$(node -p "JSON.stringify(require('./package.json').tags || [])")
          REPO="${{ github.repository }}"
          PORTFOLIO_REPO="${{ github.repository_owner }}/portfolio-hub"

          curl -s -X POST \
            -H "Authorization: token $PORTFOLIO_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$PORTFOLIO_REPO/dispatches" \
            -d "{
              \"event_type\": \"project-update\",
              \"client_payload\": {
                \"project\": \"$PROJECT\",
                \"display_name\": \"$DISPLAY_NAME\",
                \"version\": \"$VERSION\",
                \"description\": \"$DESCRIPTION\",
                \"tags\": $TAGS,
                \"repo\": \"$REPO\"
              }
            }"
